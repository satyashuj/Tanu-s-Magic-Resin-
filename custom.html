<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Orders - Tanu's Magic Resin</title>
<link rel="icon" href="PHOTO.png" type="image/png">
<link rel="stylesheet" href="style.css">

<style>

/* BACKGROUND */
body{
    background:linear-gradient(135deg,#f8fafc,#e2e8f0);
    margin:0;
    font-family:Arial;
}

/* MAIN BOX */
.section{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    gap:40px;
    padding:40px;
    margin:40px auto;
    max-width:900px;
    border-radius:20px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* IMAGE */
.section img{
    width:300px;
    border-radius:15px;
}

/* FORM */
.form-box{
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* INPUT */
.form-box input{
    padding:12px;
    width:260px;
    border-radius:8px;
    border:1px solid #ddd;
    outline:none;
}

/* BUTTON */
.form-box button{
    padding:12px;
    border:none;
    border-radius:8px;
    background:#6366f1;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* HEADER */
header{
    background:#ff4d6d;
    color:white;
    text-align:center;
    padding:15px;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:15px;
    padding:10px;
    background:#222;
}

nav a{
    color:white;
    text-decoration:none;
    padding:8px 15px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:15px;
    background:#111;
    color:white;
}

</style>

</head>

<body>

<header>Custom Orders</header>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="about.html">About</a>
<a href="custom.html" class="active">Custom Orders</a>
<a href="contact.html">Contact</a>
</nav>

<div class="section">

<img src="OREDER.png" alt="Custom Orders">

<div class="form-box">

<h2>Place Custom Order</h2>
<p>Create your own resin design 💖</p>

<!-- ✅ IDs added -->
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="product" placeholder="Product Type">
<input type="text" id="details" placeholder="Custom Details">

<button onclick="customOrder()">Submit Request</button>

<p id="orderMsg"></p>

</div>

</div>

<script>

// ✅ UNIQUE ORDER ID (BEST VERSION)
function generateOrderId() {
    return "ORD-" + Date.now();
}

// MAIN FUNCTION
function customOrder(){

    let name = document.getElementById("name").value;
    let product = document.getElementById("product").value;
    let details = document.getElementById("details").value;

    if(name === "" || product === "" || details === ""){
        alert("Please fill all fields!");
        return;
    }

    let orderId = generateOrderId();

    let msg = `✨ Custom Order Request ✨%0A%0AOrder ID: ${orderId}%0AName: ${name}%0AProduct: ${product}%0ADetails: ${details}`;

    window.open(`https://wa.me/917347651187?text=${msg}`);

    // Show on page
    document.getElementById("orderMsg").innerText = "Your Order ID: " + orderId;
}
</script>

<footer>© 2026 Tanu's Magic Resin</footer>

</body>
</html>
